<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Talep Formu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <!-- FORM -->
    <div id="formCard" class="card">

      <h1>📩 Talep Gönder</h1>
      <p>Instagram kullanıcı adını ve talebini bırak</p>

      <form id="form" action="https://formspree.io/f/mjgjbpjj" method="POST">

        <input type="text" name="instagram" placeholder="Instagram kullanıcı adı" required>

        <textarea name="message" placeholder="Talebini yaz..." required></textarea>

        <button type="submit">Gönder</button>

      </form>

    </div>

    <!-- SUCCESS SCREEN -->
    <div id="success" class="success">

      <div class="ig-logo">📸</div>

      <h2>Talep Gönderildi</h2>
      <p>Instagram üzerinden en kısa sürede dönüş yapılacak</p>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
