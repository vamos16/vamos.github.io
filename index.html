<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Göksu ❤️</title>

<style>
body{
margin:0;
font-family:Arial;
text-align:center;
background:black;
color:white;
overflow:hidden;
transition:0.5s;
}

.light{
background:#fff;
color:#000;
}

#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

.hidden{display:none;}

#lock{
position:absolute;
top:40%;
width:100%;
}

input{
padding:10px;
border-radius:10px;
border:none;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
margin:10px;
cursor:pointer;
}

.msg{
background:rgba(255,255,255,0.2);
margin:10px;
padding:10px;
border-radius:10px;
display:inline-block;
}

#overlay{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

#no{
position:absolute;
}

#final{
position:absolute;
top:40%;
width:100%;
}
</style>
</head>

<body>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8f2b3.mp3">
</audio>

<canvas id="bg"></canvas>

<div id="lock">
<h1>Göksu ❤️</h1>
<input id="pass" placeholder="ismini yaz">
<br>
<button onclick="unlock()">Aç</button>
<p id="error"></p>
</div>

<div id="overlay" class="hidden" onclick="startSite()">
<h1 id="greet"></h1>
</div>

<div id="app" class="hidden">
<div id="chat"></div>
<div id="counter"></div>

<button onclick="toggleMode()">🌙 / ☀️</button>

<div id="buttons" class="hidden">
<button onclick="accept()">Evet 💖</button>
<button id="no" onmouseover="move()">Hayır 😢</button>
</div>
</div>

<div id="final" class="hidden">
<h1>💖 Benimle tekrar başlar mısın? 💖</h1>
</div>

<script>

// ŞİFRE
function unlock(){
let v=document.getElementById("pass").value.toLowerCase();
if(v.includes("göksu")||v.includes("goksu")){
document.getElementById("lock").style.display="none";
document.getElementById("overlay").classList.remove("hidden");
}else{
document.getElementById("error").innerText="yanlış...";
}
}

// GÜN / GECE
let hour=new Date().getHours();
document.getElementById("greet").innerText=
hour<18?"Günaydın Göksu ☀️":"İyi geceler Göksu 🌙";

// SITE BAŞLAT
function startSite(){
document.getElementById("overlay").style.display="none";
document.getElementById("app").classList.remove("hidden");
document.getElementById("music").play();
chat();
}

// CHAT MESAJLARI
let msgs=[
"Göksu...",
"Seni üzdüğüm her şey için özür dilerim...",
"Gerçekten çok pişmanım...",
"10 Haziran 2025 15:00... ❤️",
"O günden beri hayatım sensin",
"Benimle tekrar başlar mısın?"
];

function chat(){
let i=0;
function next(){
if(i<msgs.length){
let d=document.createElement("div");
d.className="msg";
d.innerText=msgs[i];
document.getElementById("chat").appendChild(d);
i++;
setTimeout(next,1500);
}else{
document.getElementById("buttons").classList.remove("hidden");
}
}
next();
}

// SAYAÇ
setInterval(()=>{
let start=new Date("2025-06-10T15:00:00");
let now=new Date()-start;

let d=Math.floor(now/86400000);
let h=Math.floor((now%86400000)/3600000);

document.getElementById("counter").innerText=
d+" gün "+h+" saat ❤️";
},1000);

// KAÇAN BUTON
function move(){
let b=document.getElementById("no");
b.style.left=Math.random()*window.innerWidth+"px";
b.style.top=Math.random()*window.innerHeight+"px";
}

// DARK MODE
function toggleMode(){
document.body.classList.toggle("light");
}

// PARTICLE HEART SYSTEM
const c=document.getElementById("bg");
const ctx=c.getContext("2d");

c.width=innerWidth;
c.height=innerHeight;

let p=[];

function add(){
p.push({
x:c.width/2,
y:c.height/2,
vx:(Math.random()-0.5)*12,
vy:(Math.random()-0.5)*12,
s:5
});
}

function loop(){
ctx.clearRect(0,0,c.width,c.height);

p.forEach(e=>{
e.x+=e.vx;
e.y+=e.vy;

ctx.fillStyle="pink";
ctx.beginPath();
ctx.arc(e.x,e.y,e.s,0,Math.PI*2);
ctx.fill();
});

requestAnimationFrame(loop);
}

loop();

// EVET BUTONU
function accept(){
for(let i=0;i<300;i++) add();

document.getElementById("app").style.display="none";
document.getElementById("final").classList.remove("hidden");
}

</script>

</body>
</html>
