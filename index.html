<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ödeme Sayfası</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6 text-center">Ödeme Yap</h2>

    <form id="paymentForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium">Kart Sahibi</label>
        <input type="text" placeholder="Ad Soyad" class="w-full mt-1 p-2 border rounded-lg" required>
      </div>

      <div>
        <label class="block text-sm font-medium">Kart Numarası</label>
        <input type="text" placeholder="1234 5678 9012 3456" maxlength="19" class="w-full mt-1 p-2 border rounded-lg" required>
      </div>

      <div class="flex gap-4">
        <div class="w-1/2">
          <label class="block text-sm font-medium">Son Kullanma</label>
          <input type="text" placeholder="MM/YY" class="w-full mt-1 p-2 border rounded-lg" required>
        </div>
        <div class="w-1/2">
          <label class="block text-sm font-medium">CVV</label>
          <input type="password" placeholder="123" maxlength="3" class="w-full mt-1 p-2 border rounded-lg" required>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium">Tutar (₺)</label>
        <input type="number" placeholder="100" class="w-full mt-1 p-2 border rounded-lg" required>
      </div>

      <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
        Ödeme Yap
      </button>
    </form>

    <p id="successMessage" class="text-green-600 text-center mt-4 hidden">Ödeme başarılı!</p>
  </div>

  <script>
    const form = document.getElementById('paymentForm');
    const message = document.getElementById('successMessage');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      message.classList.remove('hidden');
      form.reset();
    });
  </script>
</body>
</html>
