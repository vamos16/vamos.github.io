<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Göksu ❤️</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="hearts"></canvas>

<div class="overlay" onclick="startSite()">
  <h1 id="greeting"></h1>
  <p>Senin için bir mesajım var...</p>
</div>

<div class="container hidden">

<div id="chat"></div>

<div class="counter">
  💞 Seninle geçen süre:
  <p id="time"></p>
</div>

<button onclick="startGame()">🎮 Küçük bir oyun oyna</button>

<div id="game" class="hidden"></div>

<div class="buttons hidden" id="buttons">
  <button onclick="accept()">Evet 💖</button>
  <button id="noBtn" onmouseover="moveButton()">Hayır 😢</button>
</div>

</div>

<div class="result hidden" id="result">
  <h1>💖 Teşekkür ederim Göksu 💖</h1>
  <p>Seni çok seviyorum ❤️</p>
</div>

<script src="script.js"></script>
</body>
</html>
