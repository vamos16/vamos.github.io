<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Talep Formu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>📩 Talep Gönder</h1>
    <p>Instagram kullanıcı adını ve talebini bırak</p>

    <form action="https://formspree.io/f/mjgjbpjj" method="POST">

      <input type="text" name="instagram" placeholder="Instagram kullanıcı adı" required>

      <textarea name="message" placeholder="Talebini yaz..." required></textarea>

      <button type="submit">Gönder</button>

    </form>

    <div class="info">
      <p>✔ Şifre istenmez</p>
      <p>✔ Mesajlar direkt e-postaya gider</p>
    </div>

  </div>

</body>
</html>
